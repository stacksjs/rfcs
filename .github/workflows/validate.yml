name: Validate RFCs

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: rfcs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun test
      - run: bun run check
      - run: bun run typecheck
